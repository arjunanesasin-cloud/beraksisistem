<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMP NEGERI 1 SINDANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
.parallax{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#200000,#000000);
z-index:-2;
transition:transform 0.1s linear;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* LOGO */
.logo{
text-align:center;
margin-top:20px;
}
.logo img{
width:70px;
}

/* JUDUL */
.judul{
display:inline-block;
margin:20px auto;
padding:12px 25px;
background:linear-gradient(45deg,#ffd700,#ffaa00);
color:black;
font-weight:600;
font-size:20px;
border-radius:15px;
box-shadow:0 0 20px #ffaa00;
position:relative;
left:50%;
transform:translateX(-50%);
}

/* BUTTON */
.music-btn{
position:fixed;
top:15px;
right:15px;
background:red;
border:none;
padding:8px 12px;
color:white;
border-radius:20px;
cursor:pointer;
z-index:10;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
text-align:center;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
max-width:110px;
height:110px;
object-fit:cover;
margin:auto;
display:block;
}

.card h3{
font-size:14px;
margin-top:5px;
}

.card a{
display:inline-block;
margin-top:6px;
padding:6px 12px;
background:red;
color:white;
border-radius:15px;
text-decoration:none;
font-size:12px;
}

/* MATIKAN ANIMASI BERAT DI HP */
@media(max-width:600px){
.card{
animation:none;
}
}

/* FLOAT TEXT */
.floating-text{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:-1;
}

.float{
position:absolute;
color:#00ff88;
opacity:0.6;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<div class="parallax"></div>

<canvas id="matrix"></canvas>
<canvas id="particle"></canvas>

<div class="floating-text" id="floatingText"></div>

<button class="music-btn" onclick="toggleMusic()">🔊 ON</button>

<div class="logo">
<img src="logo nesasin.png">
</div>

<h1 class="judul">KARYA DIGITAL SISWA SMP NEGERI 1 SINDANG</h1>

<div class="container">
    <div class="card"><img src="tujuha.jpeg"><h3>VII A</h3><a href="https://www.instagram.com/class_7a_nesasin?igsh=ZXgyenhmZDlrbXE1&utm_source=qr">Instagram</a></div>
<div class="card"><img src="6.jpg"><h3>VII B</h3><a href="#">Instagram</a></div>
<div class="card"><img src="7.jpg"><h3>VII C</h3><a href="#">Instagram</a></div>
<div class="card"><img src="tujuhd.jpeg"><h3>VII D</h3><a href="https://www.instagram.com/sevenndee_nesasin?igsh=Z3BpNGpxb3g4cGR0">Instagram</a></div>
<div class="card"><img src="delapana.jpeg"><h3>VIII A</h3><a href="https://www.instagram.com/thewonderclass.eightaa_?igsh=b2xhenRteXQ1MGx4">Instagram</a></div>
<div class="card"><img src="delapanb.jpeg"><h3>VIII B</h3><a href="https://www.instagram.com/eight_balance8?igsh=enYxZzlqMHVhemh1">Instagram</a></div>
<div class="card"><img src="delapanc.jpeg"><h3>VIII C</h3><a href="https://www.instagram.com/eightt_threenesasinn?igsh=ZW1wa3M2bTBqdGV0">Instagram</a></div>
<div class="card"><img src="delapand.jpeg"><h3>VIII D</h3><a href="https://www.instagram.com/eigth_d_nesasin?igsh=MWRkcDI1bHB1M2x6Zw==">Instagram</a></div>


<audio id="musik" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
/* MATRIX */
const mCanvas = document.getElementById("matrix");
const mCtx = mCanvas.getContext("2d");

function resizeCanvas(){
mCanvas.width = window.innerWidth;
mCanvas.height = window.innerHeight;
}
resizeCanvas();

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let fontSize = 14;
let columns = mCanvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function drawMatrix(){
mCtx.fillStyle="rgba(0,0,0,0.07)";
mCtx.fillRect(0,0,mCanvas.width,mCanvas.height);

mCtx.fillStyle="#ff0000";
mCtx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text = letters[Math.floor(Math.random()*letters.length)];
mCtx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > mCanvas.height && Math.random()>0.98)
drops[i]=0;

drops[i]++;
}
}
setInterval(drawMatrix,60);

/* PARTICLE */
const pCanvas = document.getElementById("particle");
const pCtx = pCanvas.getContext("2d");

function resizeParticle(){
pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;
}
resizeParticle();

let particles=[];

function explosion(x,y){
for(let i=0;i<10;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*4,
dy:(Math.random()-0.5)*4,
life:60
});
}
}

function animate(){
pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);

particles.forEach((p,i)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;

pCtx.fillStyle="red";
pCtx.fillRect(p.x,p.y,2,2);

if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(animate);
}
animate();

setInterval(()=>{
explosion(Math.random()*pCanvas.width,Math.random()*pCanvas.height);
},800);

/* PARALLAX (HP + PC) */
function moveParallax(x,y){
document.querySelector(".parallax").style.transform =
`translate(${x*0.02}px,${y*0.02}px)`;
}

document.addEventListener("mousemove",(e)=>{
moveParallax(e.clientX,e.clientY);
});

document.addEventListener("touchmove",(e)=>{
let t=e.touches[0];
moveParallax(t.clientX,t.clientY);
});

/* MUSIC */
let music = document.getElementById("musik");
let isPlaying = false;

function toggleMusic(){
if(!isPlaying){
music.play();
isPlaying=true;
document.querySelector(".music-btn").innerText="🔊 OFF";
}else{
music.pause();
isPlaying=false;
document.querySelector(".music-btn").innerText="🔇 ON";
}
}

/* FLOAT TEXT */
const kelas = ["VII A","VII B","VII C","VII D","VIII A","VIII B","VIII C","VIII D"];
const floatContainer = document.getElementById("floatingText");

function createFloat(){
let span = document.createElement("span");
span.className="float";
span.innerText = kelas[Math.floor(Math.random()*kelas.length)];

span.style.left = Math.random()*100+"vw";
span.style.fontSize = (14+Math.random()*10)+"px";
span.style.animationDuration = (6+Math.random()*4)+"s";

floatContainer.appendChild(span);

setTimeout(()=>span.remove(),10000);
}

setInterval(createFloat,700);

/* RESIZE FIX */
window.addEventListener("resize",()=>{
resizeCanvas();
resizeParticle();
});
</script>

</body>
</html>
